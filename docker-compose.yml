services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: log_analyzer
      POSTGRES_USER: log_analyzer
      POSTGRES_PASSWORD: log_analyzer_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U log_analyzer -d log_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: rmeedima/log-analyzer-backend:latest
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://log_analyzer:log_analyzer_dev@db:5432/log_analyzer
      UPLOAD_STORAGE_DIR: /app/uploads
    command: >
      sh -c "python init_db.py &&
             gunicorn --bind 0.0.0.0:5000 app:app"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: rmeedima/log-analyzer-frontend:latest
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  uploads_data:
